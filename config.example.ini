; Copy to config.ini and fill in real values.
; NEVER commit config.ini with secrets.

[auth]
; Token TradingView (or any client) must pass as ?token=...
token=CHANGE_ME_SECRET_TOKEN

[server]
ip=0.0.0.0
port=8080
dealerid=10

[cms]
; TCP host/port of your order-management / CMS process
host=127.0.0.1
port=8212

[logger]
file=logs/log.log
level=info
size=500
max_file=5
order_response_file=logs/order_responses.log

[database]
; NSE / primary security-master + strategy config DB
ip=127.0.0.1
port=5432
name=tick
username=postgres
password=CHANGE_ME
application_id=9001

[database-BSE]
; Optional second DB for BSE symbols (leave blank / comment out if unused)
ip=127.0.0.1
port=5432
name=tick_bse
username=postgres
password=CHANGE_ME
application_id=9069
